services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stress_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data

  # --------------------------------------------------------------------
  # NEW: this service was missing entirely. Without it, `docker-compose up`
  # never ran your DAG — only the API and the database started. This uses
  # Airflow's built-in `standalone` mode (webserver + scheduler in one
  # container, SQLite-backed metadata db) so the whole thing runs with a
  # single `docker-compose up`, no separate airflow-init step needed.
  # Fixed admin credentials below so your demo video doesn't depend on
  # grepping a random generated password out of the logs.
  # --------------------------------------------------------------------
  airflow:
    image: apache/airflow:2.9.3
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: standalone

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile  # confirmed: this one installs api/requirements.txt and runs uvicorn main:app (WORKDIR /app)
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stress_db
    volumes:
      # NEW: without this, main.py's open("data/insights.json") has nothing
      # to read inside the api container — Airflow writes insights.json to
      # ./data on the host, this shares that same folder into the api
      # container. Adjust "/app/data" if your Dockerfile.api uses a
      # different WORKDIR than /app.
      - ./data:/app/data
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
